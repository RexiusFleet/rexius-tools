<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rexius Fleet — Notifications</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@300;400;500;600&display=swap');

:root {
  --ink: #0d0d0d;
  --paper: #fafaf8;
  --surface: #f3f2ee;
  --border: #d8d6d0;
  --green: #1a5c32;
  --green-mid: #2d7d4a;
  --green-light: #e8f5ee;
  --red: #8b1a1a;
  --red-light: #fdf0f0;
  --amber: #7a4a00;
  --amber-light: #fef8ec;
  --gray: #6b7280;
  --mono: 'IBM Plex Mono', monospace;
  --display: 'Barlow Condensed', sans-serif;
  --body: 'Barlow', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { font-family: var(--body); background: var(--surface); color: var(--ink); -webkit-font-smoothing: antialiased; }

#loginScreen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--ink); background-image: repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(255,255,255,.03) 39px,rgba(255,255,255,.03) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(255,255,255,.03) 39px,rgba(255,255,255,.03) 40px); }
.login-box { background: var(--paper); border: 1px solid #333; width: 100%; max-width: 400px; padding: 36px; }
.login-wordmark { font-family: var(--display); font-size: 11px; font-weight: 600; letter-spacing: .25em; text-transform: uppercase; color: var(--green); margin-bottom: 4px; }
.login-title { font-family: var(--display); font-size: 30px; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
.login-sub { font-size: 13px; color: #666; margin-bottom: 24px; }
.login-label { display: block; font-family: var(--mono); font-size: 11px; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; color: #555; margin-bottom: 5px; }
.login-input { width: 100%; font-family: var(--body); font-size: 15px; padding: 10px 13px; border: 1px solid var(--border); background: var(--paper); color: var(--ink); margin-bottom: 12px; outline: none; transition: border-color .15s; }
.login-input:focus { border-color: var(--green); }
.login-btn { width: 100%; font-family: var(--display); font-size: 15px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; padding: 12px; border: none; background: var(--ink); color: var(--paper); cursor: pointer; margin-top: 4px; transition: background .12s; }
.login-btn:hover { background: var(--green); }
.login-err { color: var(--red); font-size: 13px; margin-top: 10px; display: none; }
.login-err.show { display: block; }

#appScreen { display: none; min-height: 100vh; }
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; background: var(--ink); color: var(--paper); }
.topbar-brand { font-family: var(--display); font-size: 18px; font-weight: 700; letter-spacing: .04em; }
.topbar-right { display: flex; align-items: center; gap: 14px; font-size: 12px; color: rgba(255,255,255,.7); }
.topbar-link { color: rgba(255,255,255,.7); font-family: var(--mono); font-size: 11px; text-decoration: none; text-transform: uppercase; letter-spacing: .05em; }
.topbar-link:hover { color: var(--paper); }
.logout-btn { background: none; border: 1px solid rgba(255,255,255,.3); color: rgba(255,255,255,.7); font-family: var(--mono); font-size: 11px; padding: 4px 10px; cursor: pointer; text-transform: uppercase; }
.logout-btn:hover { color: var(--paper); border-color: var(--paper); }

.wrap { max-width: 760px; margin: 0 auto; padding: 20px; }
.controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
.ctrl-label { font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--gray); }
.form-select { font-family: var(--body); font-size: 14px; padding: 8px 11px; border: 1px solid var(--border); background: var(--paper); color: var(--ink); outline: none; }
.form-select:focus { border-color: var(--green); }
.toggle { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #444; cursor: pointer; }
.count-pill { font-family: var(--mono); font-size: 11px; font-weight: 600; padding: 3px 9px; background: var(--red); color: #fff; }

.notif { background: var(--paper); border: 1px solid var(--border); border-left: 4px solid var(--gray); padding: 14px 16px; margin-bottom: 10px; }
.notif.disp-out_of_service { border-left-color: var(--red); }
.notif.disp-urgent { border-left-color: var(--amber); }
.notif.disp-schedule { border-left-color: var(--green); }
.notif.read { opacity: .55; }
.notif-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
.notif-title { font-size: 15px; font-weight: 600; color: var(--ink); line-height: 1.35; }
.notif-disp { font-family: var(--mono); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; padding: 2px 8px; white-space: nowrap; }
.disp-out_of_service .notif-disp { background: var(--red); color: #fff; }
.disp-urgent .notif-disp { background: var(--amber-light); color: var(--amber); }
.disp-schedule .notif-disp { background: var(--green-light); color: var(--green); }
.notif-body { font-size: 13px; color: #555; margin-top: 5px; line-height: 1.4; }
.notif-meta { display: flex; gap: 14px; align-items: center; margin-top: 9px; font-family: var(--mono); font-size: 10px; color: var(--gray); flex-wrap: wrap; }
.notif-meta a { color: var(--green); text-decoration: underline; }
.notif-actions { margin-top: 10px; display: flex; gap: 8px; }
.n-btn { font-family: var(--mono); font-size: 11px; padding: 5px 12px; border: 1px solid var(--border); background: var(--paper); color: #444; cursor: pointer; text-transform: uppercase; letter-spacing: .03em; }
.n-btn:hover { border-color: var(--green); color: var(--green); }
.empty { text-align: center; color: var(--gray); padding: 50px 20px; font-size: 14px; }
.spinner { text-align: center; padding: 50px; color: var(--gray); font-family: var(--mono); font-size: 12px; }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="login-wordmark">Rexius Fleet</div>
    <div class="login-title">Notifications</div>
    <div class="login-sub">Supervisor &amp; management alerts</div>
    <label class="login-label" for="loginName">Your Name</label>
    <input class="login-input" id="loginName" placeholder="First Last" autocomplete="name">
    <label class="login-label" for="loginPass">Password</label>
    <input class="login-input" id="loginPass" type="password" placeholder="••••••••">
    <button class="login-btn" id="loginBtn">Sign In</button>
    <div class="login-err" id="loginErr">Incorrect password.</div>
  </div>
</div>

<div id="appScreen">
  <div class="topbar">
    <div class="topbar-brand">Rexius Fleet — Notifications</div>
    <div class="topbar-right">
      <span id="whoami"></span>
      <button class="logout-btn" id="logoutBtn">Log out</button>
    </div>
  </div>
  <div class="wrap">
    <div class="controls">
      <span class="ctrl-label">Recipient</span>
      <select class="form-select" id="filterRecipient"><option value="all">All recipients</option></select>
      <label class="toggle"><input type="checkbox" id="showRead"> Show read</label>
      <span class="count-pill" id="unreadPill" style="display:none"></span>
      <button class="n-btn" id="refreshBtn" style="margin-left:auto">Refresh</button>
    </div>
    <div id="notifList"><div class="spinner">Loading…</div></div>
  </div>
</div>

<script>
const SUPA = 'https://toduddkyttuablausist.supabase.co';
const KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvZHVkZGt5dHR1YWJsYXVzaXN0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NjY5MTEsImV4cCI6MjA5NjI0MjkxMX0.ZdtMIuc9kEo7-x0Lr-y2--F1aqkurbLJ0YxeQD2ggDQ';
const H = { apikey: KEY, Authorization: `Bearer ${KEY}`, 'Content-Type': 'application/json' };
const PASSWORD = 'rexius2024';
const SESSION_KEY = 'rexius_notif_session';
// Link target for opening a work order in the portal (convention-based; same org pages site)
const WO_PORTAL_URL = 'rexius-work-orders.html';

let currentUser = null;
let allNotifs = [];

async function rpc(fn, body) {
  const r = await fetch(`${SUPA}/rest/v1/rpc/${fn}`, { method: 'POST', headers: H, body: JSON.stringify(body) });
  return r.json();
}

// ── Login ──────────────────────────────────────────────────────────
document.getElementById('loginBtn').addEventListener('click', doLogin);
document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('logoutBtn').addEventListener('click', logout);
document.getElementById('refreshBtn').addEventListener('click', () => loadData());
document.getElementById('filterRecipient').addEventListener('change', () => loadData());
document.getElementById('showRead').addEventListener('change', () => loadData());

function doLogin() {
  const name = document.getElementById('loginName').value.trim();
  const pass = document.getElementById('loginPass').value;
  const err = document.getElementById('loginErr');
  if (!name) { err.textContent = 'Enter your name.'; err.classList.add('show'); return; }
  if (pass !== PASSWORD) { err.textContent = 'Incorrect password.'; err.classList.add('show'); return; }
  err.classList.remove('show');
  enterApp(name);
  try { localStorage.setItem(SESSION_KEY, JSON.stringify({ user: name })); } catch(e) {}
}

function enterApp(name) {
  currentUser = name;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
  document.getElementById('whoami').textContent = name;
  loadData();
}

function tryRestoreSession() {
  let saved = null;
  try { saved = JSON.parse(localStorage.getItem(SESSION_KEY)); } catch(e) { saved = null; }
  if (saved && saved.user) enterApp(saved.user);
}

function logout() {
  currentUser = null;
  try { localStorage.removeItem(SESSION_KEY); } catch(e) {}
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
}

// ── Data ───────────────────────────────────────────────────────────
async function loadData() {
  const recipient = document.getElementById('filterRecipient').value;
  const showRead = document.getElementById('showRead').checked;
  const listEl = document.getElementById('notifList');
  listEl.innerHTML = '<div class="spinner">Loading…</div>';
  let data;
  try {
    data = await rpc('get_notifications_data', {
      p_recipient_id: (recipient && recipient !== 'all') ? recipient : null,
      p_include_read: showRead,
    });
  } catch(e) { listEl.innerHTML = '<div class="empty">Failed to load notifications.</div>'; return; }

  allNotifs = data.notifications || [];

  // Recipient filter options (preserve current selection)
  const sel = document.getElementById('filterRecipient');
  const current = sel.value;
  const recipients = data.recipients || [];
  sel.innerHTML = '<option value="all">All recipients</option>' +
    recipients.map(r => `<option value="${r.id}">${esc(r.name)}</option>`).join('');
  sel.value = current && [...sel.options].some(o => o.value === current) ? current : 'all';

  // Unread pill
  const pill = document.getElementById('unreadPill');
  const unread = data.unread_count || 0;
  if (unread > 0) { pill.textContent = `${unread} unread`; pill.style.display = ''; }
  else { pill.style.display = 'none'; }

  renderList();
}

function renderList() {
  const listEl = document.getElementById('notifList');
  if (!allNotifs.length) { listEl.innerHTML = '<div class="empty">No notifications.</div>'; return; }
  listEl.innerHTML = allNotifs.map(n => {
    const disp = n.disposition || 'schedule';
    const woLink = n.work_order_id
      ? `<a href="${WO_PORTAL_URL}" target="_blank" rel="noopener">${esc(n.wo_number || 'Work Order')}</a>` : '';
    return `<div class="notif disp-${disp}${n.is_read ? ' read' : ''}">
      <div class="notif-head">
        <div class="notif-title">${esc(n.title)}</div>
        <span class="notif-disp">${esc(disp.replace(/_/g,' '))}</span>
      </div>
      ${n.body ? `<div class="notif-body">${esc(n.body)}</div>` : ''}
      <div class="notif-meta">
        ${n.recipient ? `<span>To: ${esc(n.recipient)}</span>` : '<span>To: (no supervisor assigned)</span>'}
        ${n.asset_number ? `<span>${esc(n.asset_number)}</span>` : ''}
        ${woLink ? `<span>WO: ${woLink}</span>` : ''}
        <span>${fmtDateTime(n.created_at)}</span>
      </div>
      <div class="notif-actions">
        <button class="n-btn" data-mark="${n.id}" data-read="${n.is_read ? 'false' : 'true'}">${n.is_read ? 'Mark unread' : 'Mark read'}</button>
      </div>
    </div>`;
  }).join('');
  listEl.querySelectorAll('[data-mark]').forEach(b =>
    b.addEventListener('click', () => markRead(b.dataset.mark, b.dataset.read === 'true')));
}

async function markRead(id, read) {
  const result = await rpc('mark_notification_read', { p_id: id, p_read: read });
  if (result?.success) loadData();
}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}
function fmtDateTime(d) {
  if (!d) return '';
  return new Date(d).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
}

tryRestoreSession();
</script>
</body>
</html>
