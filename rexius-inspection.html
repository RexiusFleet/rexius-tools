<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rexius Fleet — Inspection</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@300;400;500;600&display=swap');

:root {
  --ink: #0d0d0d;
  --paper: #fafaf8;
  --surface: #f3f2ee;
  --border: #d8d6d0;
  --green: #1a5c32;
  --green-mid: #2d7d4a;
  --green-light: #e8f5ee;
  --red: #8b1a1a;
  --red-light: #fdf0f0;
  --amber: #7a4a00;
  --amber-light: #fef8ec;
  --orange: #7a3500;
  --orange-light: #fff3e8;
  --blue: #1a3c6e;
  --blue-light: #eef3fb;
  --gray: #6b7280;
  --mono: 'IBM Plex Mono', monospace;
  --display: 'Barlow Condensed', sans-serif;
  --body: 'Barlow', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { font-family: var(--body); background: var(--surface); color: var(--ink); -webkit-font-smoothing: antialiased; }

.screen { display: none; min-height: 100vh; flex-direction: column; }
.screen.active { display: flex; }

.topbar {
  background: var(--ink); color: var(--paper);
  padding: 0 16px; height: 50px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 2px solid var(--green);
  position: sticky; top: 0; z-index: 50; flex-shrink: 0;
}
.topbar-brand { font-family: var(--display); font-size: 14px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--green); }
.topbar-center { font-family: var(--display); font-size: 13px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: rgba(255,255,255,.55); }
.lang-toggle { display: flex; border: 1px solid rgba(255,255,255,.15); overflow: hidden; }
.lang-btn { font-family: var(--mono); font-size: 11px; font-weight: 500; padding: 5px 10px; border: none; background: transparent; color: rgba(255,255,255,.4); cursor: pointer; transition: all .1s; }
.lang-btn.active { background: var(--green); color: #fff; }
.back-btn { font-family: var(--mono); font-size: 11px; color: rgba(255,255,255,.45); background: none; border: 1px solid rgba(255,255,255,.12); padding: 5px 11px; cursor: pointer; transition: all .12s; }
.back-btn:hover { border-color: var(--green); color: var(--green); }

.content { flex: 1; padding: 16px; max-width: 600px; margin: 0 auto; width: 100%; padding-bottom: 32px; }

.asset-hero { background: var(--green); color: #fff; padding: 18px 16px; margin-bottom: 12px; border-left: 4px solid var(--green-mid); }
.asset-hero-num { font-family: var(--display); font-size: 30px; font-weight: 700; letter-spacing: -.01em; line-height: 1; }
.asset-hero-desc { font-family: var(--body); font-size: 13px; opacity: .8; margin-top: 3px; }
.asset-hero-team { font-family: var(--mono); font-size: 10px; opacity: .6; margin-top: 5px; letter-spacing: .08em; text-transform: uppercase; }

.card { background: var(--paper); border: 1px solid var(--border); margin-bottom: 10px; }
.card-header { padding: 10px 14px; border-bottom: 1px solid var(--border); background: var(--surface); }
.card-label { font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--gray); }
.card-body { padding: 14px; }

.asset-search-input { width: 100%; font-family: var(--body); font-size: 15px; padding: 10px 13px; border: 1px solid var(--border); background: var(--paper); color: var(--ink); outline: none; transition: border-color .15s; }
.asset-search-input:focus { border-color: var(--green); }
.asset-drop { border: 1px solid var(--border); background: var(--paper); max-height: 220px; overflow-y: auto; z-index: 9999; margin-top: 4px; display: none; }
.asset-drop.open { display: block; }
.asset-opt { padding: 10px 13px; cursor: pointer; border-bottom: 1px solid var(--surface); transition: background .1s; display: flex; align-items: center; justify-content: space-between; }
.asset-opt:last-child { border-bottom: none; }
.asset-opt:hover { background: var(--green-light); }
.asset-opt-num { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--ink); }
.asset-opt-desc { font-size: 12px; color: var(--gray); margin-left: 8px; }

.type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.type-btn { background: var(--paper); border: 1px solid var(--border); padding: 14px 10px; text-align: center; cursor: pointer; transition: all .15s; }
.type-btn:hover { border-color: var(--green); }
.type-btn.selected { border-color: var(--green); background: var(--green-light); border-width: 2px; }
.type-icon { font-size: 22px; margin-bottom: 5px; line-height: 1; display: flex; align-items: center; justify-content: center; }
.type-icon svg { color: var(--ink); display: block; }
.type-btn.selected .type-icon svg { color: var(--green); }
.type-label { font-family: var(--display); font-size: 14px; font-weight: 700; letter-spacing: .02em; text-transform: uppercase; color: var(--ink); }
.type-sub { font-family: var(--mono); font-size: 10px; color: var(--gray); margin-top: 2px; }

.driver-input { width: 100%; font-family: var(--body); font-size: 15px; padding: 10px 13px; border: 1px solid var(--border); background: var(--paper); color: var(--ink); outline: none; transition: border-color .15s; }
.driver-input:focus { border-color: var(--green); }
.driver-drop { border: 1px solid var(--border); background: var(--paper); max-height: 200px; overflow-y: auto; z-index: 9999; margin-top: 4px; display: none; }
.driver-drop.open { display: block; }
.driver-opt { padding: 10px 13px; cursor: pointer; border-bottom: 1px solid var(--surface); transition: background .1s; }
.driver-opt:last-child { border-bottom: none; }
.driver-opt:hover { background: var(--green-light); }
.driver-opt-name { font-size: 14px; font-weight: 500; color: var(--ink); }
.driver-opt-sub { font-family: var(--mono); font-size: 10px; color: var(--gray); margin-top: 2px; }
.new-tag { display: inline-block; font-family: var(--mono); font-size: 9px; font-weight: 600; padding: 1px 5px; background: var(--amber-light); color: var(--amber); letter-spacing: .04em; text-transform: uppercase; margin-left: 6px; }
.driver-badge { display: flex; align-items: center; gap: 8px; padding: 9px 13px; background: var(--green-light); border: 1px solid var(--green); margin-top: 6px; }
.driver-badge-name { font-size: 14px; font-weight: 600; color: var(--green); flex: 1; }
.driver-clear { font-family: var(--mono); font-size: 11px; color: var(--gray); background: none; border: none; cursor: pointer; }

.start-btn { width: 100%; font-family: var(--display); font-size: 16px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; padding: 14px; border: none; background: var(--ink); color: var(--paper); cursor: pointer; margin-top: 8px; transition: background .12s; }
.start-btn:hover:not(:disabled) { background: var(--green); }
.start-btn:disabled { background: var(--border); color: var(--gray); cursor: not-allowed; }

.progress-wrap { margin: 0 0 14px; }
.progress-labels { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 11px; color: var(--gray); margin-bottom: 5px; }
.progress-track { height: 4px; background: var(--border); }
.progress-fill { height: 100%; background: var(--green); transition: width .3s; }

.check-item { border-bottom: 1px solid var(--surface); }
.check-item:last-child { border-bottom: none; }
.check-row { display: flex; align-items: center; padding: 12px 14px; gap: 12px; }
.check-label { flex: 1; font-size: 14px; color: var(--ink); line-height: 1.3; }
.check-label.failed { color: var(--red); font-weight: 600; }
.pf-wrap { display: flex; gap: 5px; flex-shrink: 0; }
.pf-btn { font-family: var(--display); font-size: 12px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; padding: 6px 14px; border: 1px solid var(--border); background: transparent; color: var(--gray); cursor: pointer; transition: all .12s; -webkit-tap-highlight-color: transparent; }
.pf-btn.pass { border-color: var(--green); background: var(--green-light); color: var(--green); }
.pf-btn.fail { border-color: var(--red); background: var(--red-light); color: var(--red); }

.defect-panel { margin: 0 14px 12px; padding: 12px; background: var(--red-light); border-left: 3px solid var(--red); }
.defect-panel-title { font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--red); margin-bottom: 8px; }
.defect-textarea { width: 100%; font-family: var(--body); font-size: 13px; padding: 8px 10px; border: 1px solid #fca5a5; background: #fff; color: var(--ink); resize: none; min-height: 60px; outline: none; }
.defect-textarea:focus { border-color: var(--red); }
.sev-row { display: flex; gap: 6px; margin-top: 8px; }
.sev-btn { font-family: var(--mono); font-size: 10px; font-weight: 600; padding: 4px 10px; border: 1px solid var(--border); background: transparent; color: var(--gray); cursor: pointer; letter-spacing: .04em; text-transform: uppercase; transition: all .12s; }
.sev-btn.minor.sel  { border-color: var(--amber); background: var(--amber-light); color: var(--amber); }
.sev-btn.major.sel  { border-color: var(--orange); background: var(--orange-light); color: var(--orange); }
.sev-btn.critical.sel { border-color: var(--red); background: var(--red-light); color: var(--red); }

.photo-upload-btn { display: flex; align-items: center; gap: 8px; margin-top: 10px; width: 100%; font-family: var(--mono); font-size: 11px; font-weight: 500; letter-spacing: .05em; text-transform: uppercase; padding: 8px 12px; border: 1px dashed #fca5a5; background: #fff; color: var(--red); cursor: pointer; transition: all .12s; }
.photo-upload-btn:hover { border-color: var(--red); background: var(--red-light); }
.photo-upload-btn input { display: none; }
.photo-preview-wrap { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
.photo-thumb { position: relative; width: 64px; height: 64px; }
.photo-thumb img { width: 64px; height: 64px; object-fit: cover; border: 1px solid #fca5a5; display: block; }
.photo-remove { position: absolute; top: -5px; right: -5px; width: 16px; height: 16px; border-radius: 50%; background: var(--red); color: #fff; font-size: 10px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; }
.photo-uploading { font-family: var(--mono); font-size: 10px; color: var(--gray); margin-top: 4px; }

.check-number { width: 100%; font-family: var(--mono); font-size: 15px; padding: 9px 12px; border: 1px solid var(--border); background: var(--paper); color: var(--ink); outline: none; margin-top: 6px; }
.check-number:focus { border-color: var(--green); }
.check-textarea { width: 100%; font-family: var(--body); font-size: 14px; padding: 9px 12px; border: 1px solid var(--border); background: var(--paper); color: var(--ink); resize: none; min-height: 72px; outline: none; margin-top: 6px; }
.check-textarea:focus { border-color: var(--green); }

.cert-box { background: var(--paper); border: 1px solid var(--border); padding: 14px; margin-bottom: 10px; }
.cert-label { display: flex; align-items: flex-start; gap: 12px; cursor: pointer; }
.cert-check { width: 20px; height: 20px; margin-top: 1px; accent-color: var(--green); flex-shrink: 0; cursor: pointer; }
.cert-text { font-size: 13px; color: var(--ink); line-height: 1.5; }

.submit-btn { width: 100%; font-family: var(--display); font-size: 16px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; padding: 14px; border: none; background: var(--ink); color: var(--paper); cursor: pointer; margin-top: 8px; transition: background .12s; -webkit-tap-highlight-color: transparent; }
.submit-btn:hover:not(:disabled) { background: var(--green); }
.submit-btn:disabled { background: var(--border); color: var(--gray); cursor: not-allowed; }

.success-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; text-align: center; gap: 12px; }
.success-icon { font-size: 56px; }
.success-title { font-family: var(--display); font-size: 28px; font-weight: 700; letter-spacing: .02em; text-transform: uppercase; color: var(--green); }
.success-sub { font-size: 14px; color: var(--gray); line-height: 1.6; max-width: 280px; }
.success-defect { font-family: var(--mono); font-size: 12px; color: var(--red); margin-top: 4px; width: 100%; max-width: 400px; }
.new-btn { font-family: var(--display); font-size: 14px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; padding: 12px 28px; border: 2px solid var(--green); background: transparent; color: var(--green); cursor: pointer; margin-top: 12px; transition: all .12s; }
.new-btn:hover { background: var(--green); color: #fff; }

.loading-overlay { position: fixed; inset: 0; background: rgba(250,250,248,.92); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 200; gap: 12px; }
.loading-overlay.show { display: flex; }
.spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-family: var(--mono); font-size: 12px; color: var(--gray); letter-spacing: .05em; }

.error-banner { background: var(--red-light); border-left: 3px solid var(--red); padding: 10px 13px; font-size: 13px; color: var(--red); margin-bottom: 10px; display: none; }
.error-banner.show { display: block; }
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">Loading...</div>
</div>

<!-- SCREEN 1: SETUP -->
<div class="screen active" id="screenSetup">
  <div class="topbar">
    <div class="topbar-brand">Rexius Fleet</div>
    <div class="topbar-center" id="setupTopLabel">Inspection</div>
    <div class="lang-toggle">
      <button class="lang-btn active" id="langEn">EN</button>
      <button class="lang-btn" id="langEs">ES</button>
    </div>
  </div>
  <div class="content">
    <div class="error-banner" id="setupError"></div>
    <div id="assetHero"></div>
    <div class="card" id="typeCard">
      <div class="card-header"><span class="card-label" id="typeCardLabel">Inspection Type</span></div>
      <div class="card-body"><div class="type-grid" id="typeGrid"></div></div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-label" id="driverCardLabel">Driver / Operator</span></div>
      <div class="card-body">
        <div style="position:relative">
          <input class="driver-input" id="driverInput" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="Search name...">
          <div class="driver-drop" id="driverDrop"></div>
        </div>
        <div id="driverBadge" style="display:none" class="driver-badge">
          <span class="driver-badge-name" id="driverBadgeName"></span>
          <button class="driver-clear" id="driverClearBtn">✕</button>
        </div>
      </div>
    </div>
    <button class="start-btn" id="startBtn" disabled>Start Inspection</button>
  </div>
</div>

<!-- SCREEN 2: CHECKLIST -->
<div class="screen" id="screenChecklist">
  <div class="topbar">
    <button class="back-btn" id="backBtn">← Back</button>
    <div class="topbar-center" id="checklistAssetLabel"></div>
    <div class="lang-toggle">
      <button class="lang-btn active" id="langEn2">EN</button>
      <button class="lang-btn" id="langEs2">ES</button>
    </div>
  </div>
  <div class="content">
    <div class="progress-wrap">
      <div class="progress-labels">
        <span id="progressLabel">0 of 0</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
    <div class="card" id="checklistCard"></div>
    <div class="cert-box" id="certBox">
      <label class="cert-label">
        <input type="checkbox" class="cert-check" id="certCheck">
        <span class="cert-text" id="certText">I certify that I am the person named above and that this inspection was conducted by me to the best of my ability.</span>
      </label>
    </div>
    <button class="submit-btn" id="submitBtn" disabled>Submit Inspection</button>
    <div style="height:40px"></div>
  </div>
</div>

<!-- SCREEN 3: SUCCESS -->
<div class="screen" id="screenSuccess">
  <div class="topbar">
    <div class="topbar-brand">Rexius Fleet</div>
    <div class="topbar-center"></div>
    <div></div>
  </div>
  <div class="success-wrap">
    <div class="success-icon">✅</div>
    <div class="success-title" id="successTitle">Submitted</div>
    <div class="success-sub" id="successSub">Inspection recorded successfully.</div>
    <div class="success-defect" id="successDefect"></div>
    <button class="new-btn" id="newInspBtn">New Inspection</button>
  </div>
</div>

<script>
const SUPA = 'https://toduddkyttuablausist.supabase.co';
const KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvZHVkZGt5dHR1YWJsYXVzaXN0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NjY5MTEsImV4cCI6MjA5NjI0MjkxMX0.ZdtMIuc9kEo7-x0Lr-y2--F1aqkurbLJ0YxeQD2ggDQ';
const H = { apikey: KEY, Authorization: `Bearer ${KEY}`, 'Content-Type': 'application/json' };
const BUCKET = 'rexius-fleet-photos';

let lang = 'en';
let asset = null;
let teamRef = null;
let inspType = null;
let selectedDriver = null;
let formItems = [];
let responses = {};
let allPeople = [];
let defectPhotos = {};

// ── i18n ───────────────────────────────────────────────────────────
const T = {
  en: {
    typeCardLabel: 'Inspection Type', driverCardLabel: 'Driver / Operator',
    startBtn: 'Start Inspection', submitBtn: 'Submit Inspection',
    pass: 'Pass', fail: 'Fail',
    searchDriver: 'Search name...', searchAsset: 'Search asset number, make, model...',
    assetLabel: 'Select Asset', newTag: 'NEW',
    defectLabel: 'Describe defect', addPhoto: '📷  Add Photo',
    sev: { minor: 'Minor', critical: 'Critical' },
    cert: 'I certify that I am the person named above and that this inspection was conducted by me to the best of my ability.',
    successTitle: 'Submitted', successSub: 'Inspection recorded successfully.',
    newInsp: 'New Inspection', submitting: 'Submitting...', loading: 'Loading...',
    inService: 'In Service', outOfService: 'Out of Service',
  },
  es: {
    typeCardLabel: 'Tipo de Inspección', driverCardLabel: 'Conductor / Operador',
    startBtn: 'Iniciar Inspección', submitBtn: 'Enviar Inspección',
    pass: 'Pasa', fail: 'Falla',
    searchDriver: 'Buscar nombre...', searchAsset: 'Buscar activo, marca, modelo...',
    assetLabel: 'Seleccionar Activo', newTag: 'NUEVO',
    defectLabel: 'Describir defecto', addPhoto: '📷  Agregar Foto',
    sev: { minor: 'Menor', critical: 'Crítico' },
    cert: 'Certifico que soy la persona indicada y que realicé esta inspección de la mejor manera posible.',
    successTitle: 'Enviado', successSub: 'Inspección registrada correctamente.',
    newInsp: 'Nueva Inspección', submitting: 'Enviando...', loading: 'Cargando...',
    inService: 'En Servicio', outOfService: 'Fuera de Servicio',
  }
};
const t = k => T[lang][k] || T.en[k] || k;

// ── Static event listeners (attached once on load) ─────────────────
document.getElementById('langEn').addEventListener('click', e => { e.stopPropagation(); setLang('en'); });
document.getElementById('langEs').addEventListener('click', e => { e.stopPropagation(); setLang('es'); });
document.getElementById('langEn2').addEventListener('click', e => { e.stopPropagation(); setLang('en'); });
document.getElementById('langEs2').addEventListener('click', e => { e.stopPropagation(); setLang('es'); });
document.getElementById('backBtn').addEventListener('click', e => { e.stopPropagation(); goBack(); });
document.getElementById('startBtn').addEventListener('click', e => { e.stopPropagation(); startInspection(); });
document.getElementById('submitBtn').addEventListener('click', e => { e.stopPropagation(); submitInspection(); });
document.getElementById('newInspBtn').addEventListener('click', e => { e.stopPropagation(); resetAll(); });
document.getElementById('driverClearBtn').addEventListener('click', e => { e.stopPropagation(); clearDriver(); });
document.getElementById('certCheck').addEventListener('change', () => onCertChange());

const driverInput = document.getElementById('driverInput');
driverInput.addEventListener('input', () => onDriverSearch(driverInput.value));
driverInput.addEventListener('focus', () => onDriverSearch(driverInput.value));

// ── Event delegation for dynamically generated content ─────────────
document.addEventListener('click', e => {
  // Type grid buttons
  const typeBtn = e.target.closest('.type-btn');
  if (typeBtn && typeBtn.dataset.type) {
    selectType(typeBtn.dataset.type);
    return;
  }

  // Asset search options
  const assetOpt = e.target.closest('.asset-opt[data-idx]');
  if (assetOpt) {
    pickAsset(parseInt(assetOpt.dataset.idx));
    return;
  }

  // Driver options
  const driverOpt = e.target.closest('.driver-opt[data-idx]');
  if (driverOpt) {
    pickDriver(parseInt(driverOpt.dataset.idx));
    return;
  }

  // Pass/fail buttons
  const pfBtn = e.target.closest('.pf-btn[data-item-id][data-value]');
  if (pfBtn) {
    setResp(pfBtn.dataset.itemId, pfBtn.dataset.value);
    return;
  }

  // Severity buttons
  const sevBtn = e.target.closest('.sev-btn[data-item-id][data-sev]');
  if (sevBtn) {
    setSev(sevBtn.dataset.itemId, sevBtn.dataset.sev);
    return;
  }

  // Photo remove buttons
  const photoRemove = e.target.closest('.photo-remove[data-item-id][data-idx]');
  if (photoRemove) {
    removePhoto(photoRemove.dataset.itemId, parseInt(photoRemove.dataset.idx));
    return;
  }
});

// Input delegation for dynamically generated inputs/textareas
document.addEventListener('input', e => {
  const el = e.target;

  // Number/text checklist inputs — skipRender=true to avoid jumping to top on each keystroke
  if (el.classList.contains('check-number') && el.dataset.itemId) {
    setResp(el.dataset.itemId, el.value, true);
    return;
  }
  if (el.classList.contains('check-textarea') && el.dataset.itemId) {
    setResp(el.dataset.itemId, el.value, true);
    return;
  }

  // Defect notes textarea
  if (el.classList.contains('defect-textarea') && el.dataset.itemId) {
    setDefectNote(el.dataset.itemId, el.value);
    return;
  }

  // Asset search input (dynamically injected)
  if (el.id === 'assetSearchInput') {
    onAssetSearch(el.value);
    return;
  }
});

// Focus delegation for asset search (dynamically injected)
document.addEventListener('focusin', e => {
  if (e.target.id === 'assetSearchInput') {
    onAssetSearch(e.target.value);
  }
});

document.addEventListener('change', e => {

// ── Init ───────────────────────────────────────────────────────────
async function init() {
  showLoading(true, t('loading'));
  await loadPeople();
  const params = new URLSearchParams(location.search);
  let assetNum = params.get('asset') || params.get('a');
  if (!assetNum) {
    const m = location.pathname.match(/\/i\/([^?#]+)/);
    if (m) assetNum = decodeURIComponent(m[1]);
  }
  if (assetNum) {
    await loadAsset(assetNum);
  } else {
    showAssetSearch();
  }
  showLoading(false);
}

async function loadPeople() {
  try {
    const r = await fetch(`${SUPA}/rest/v1/people?select=id,first_name,last_name&is_active=eq.true&deleted_at=is.null&order=last_name`, { headers: H });
    const data = await r.json();
    allPeople = Array.isArray(data) ? data.map(p => ({ id: p.id, name: [p.first_name, p.last_name].filter(Boolean).join(' ').trim(), isNew: false })).filter(p => p.name) : [];
    const seen = new Set();
    allPeople = allPeople.filter(p => { if (seen.has(p.name.toLowerCase())) return false; seen.add(p.name.toLowerCase()); return true; });
  } catch(e) { allPeople = []; }
  try {
    const r = await fetch(`${SUPA}/rest/v1/assets?select=id,asset_number,make,model,year,status,team_id,teams(name,import_ref)&deleted_at=is.null&order=asset_number`, { headers: H });
    window._allAssets = await r.json();
  } catch(e) { window._allAssets = []; }
}

async function loadAsset(assetNum) {
  try {
    const encoded = encodeURIComponent(assetNum);
    let r = await fetch(`${SUPA}/rest/v1/assets?asset_number=eq.${encoded}&select=id,asset_number,make,model,year,status,team_id,teams(name,import_ref)&deleted_at=is.null&limit=1`, { headers: H });
    let data = await r.json();
    if (!data?.[0]) {
      const fallback = assetNum.replace(/[-_]/g, ' ');
      r = await fetch(`${SUPA}/rest/v1/assets?asset_number=ilike.*${encodeURIComponent(fallback)}*&select=id,asset_number,make,model,year,status,team_id,teams(name,import_ref)&deleted_at=is.null&limit=1`, { headers: H });
      data = await r.json();
    }
    if (!data?.[0]) { showError('setupError', `Asset "${assetNum}" not found.`); showAssetSearch(); return; }
    setAsset(data[0]);
  } catch(e) { showError('setupError', 'Failed to load asset.'); showAssetSearch(); }
}

function showAssetSearch() {
  document.getElementById('assetHero').innerHTML = `
    <div class="card" style="margin-bottom:10px;position:relative;z-index:200">
      <div class="card-header"><span class="card-label">${t('assetLabel')}</span></div>
      <div class="card-body" style="position:relative">
        <input class="asset-search-input" id="assetSearchInput" autocomplete="off" autocorrect="off" placeholder="${t('searchAsset')}">
        <div class="asset-drop" id="assetDrop"></div>
      </div>
    </div>`;
}

function normStr(s) { return (s||'').toLowerCase().replace(/[\s\-_]/g,''); }

function onAssetSearch(val) {
  const drop = document.getElementById('assetDrop');
  if (!drop) return;
  if (!val.trim()) { drop.classList.remove('open'); return; }
  const q = normStr(val);
  const results = (window._allAssets||[]).filter(a => {
    const an = normStr(a.asset_number);
    const desc = normStr([a.year,a.make,a.model].filter(Boolean).join(' '));
    return an.includes(q) || desc.includes(val.toLowerCase());
  }).slice(0, 10);
  window._assetCandidates = results;
  if (!results.length) {
    drop.innerHTML = `<div class="asset-opt"><span style="color:var(--gray);font-size:13px">No assets found</span></div>`;
    drop.classList.add('open');
    return;
  }
  drop.innerHTML = results.map((a, i) => {
    const desc = [a.year,a.make,a.model].filter(Boolean).join(' ');
    const badge = a.status === 'in_service'
      ? `<span style="font-family:var(--mono);font-size:9px;padding:2px 5px;background:var(--green-light);color:var(--green);font-weight:600">${t('inService')}</span>`
      : `<span style="font-family:var(--mono);font-size:9px;padding:2px 5px;background:var(--amber-light);color:var(--amber);font-weight:600">${t('outOfService')}</span>`;
    return `<div class="asset-opt" data-idx="${i}"><div><span class="asset-opt-num">${a.asset_number}</span><span class="asset-opt-desc">${desc}</span></div>${badge}</div>`;
  }).join('');
  drop.classList.add('open');
}

function pickAsset(idx) {
  const a = (window._assetCandidates||[])[idx];
  if (!a) return;
  document.getElementById('assetDrop')?.classList.remove('open');
  setAsset(a);
}

async function setAsset(a) {
  asset = a;
  teamRef = a.teams?.import_ref || null;
  const desc = [a.year,a.make,a.model].filter(Boolean).join(' ');
  const teamName = a.teams?.name || '';
  document.getElementById('assetHero').innerHTML = `
    <div class="asset-hero">
      <div class="asset-hero-num">${a.asset_number}</div>
      ${desc ? `<div class="asset-hero-desc">${desc}</div>` : ''}
      ${teamName ? `<div class="asset-hero-team">${teamName}</div>` : ''}
    </div>`;
  await renderTypeGrid();
  checkCanStart();
}

// ── Inspection types ───────────────────────────────────────────────
// Cache: does this asset have any asset-level form override? (e.g. blower trucks)
// Assets with an override use a dedicated form set and don't tow trailers, so the
// generic Trailer Pre/Post options don't apply to them.
let _assetOverrideCache = {};
async function assetHasOverride(assetId) {
  if (assetId in _assetOverrideCache) return _assetOverrideCache[assetId];
  try {
    const r = await fetch(`${SUPA}/rest/v1/asset_inspection_forms?asset_id=eq.${assetId}&is_active=eq.true&select=id&limit=1`, { headers: H });
    const data = await r.json();
    _assetOverrideCache[assetId] = Array.isArray(data) && data.length > 0;
  } catch(e) {
    _assetOverrideCache[assetId] = false;
  }
  return _assetOverrideCache[assetId];
}

async function getTypes() {
  const ref = (teamRef||'').toLowerCase();
  const num = (asset?.asset_number||'').toLowerCase();
  if (ref.includes('equipment')) return ['equip_preshift','equip_postshift'];
  if (num.includes('trailer')) return ['trailer_pretrip','trailer_posttrip'];
  if (asset?.id && await assetHasOverride(asset.id)) return ['vehicle_pretrip','vehicle_posttrip'];
  return ['vehicle_pretrip','vehicle_posttrip','trailer_pretrip','trailer_posttrip'];
}

async function renderTypeGrid() {
  const grid = document.getElementById('typeGrid');
  if (!grid || !asset) return;

  // Use data-type attribute instead of inline onclick
  grid.innerHTML = types.map(type => {
    const d = TYPE_DEF[type] || {};

      <div class="type-icon">${d.icon}</div>

      <div class="type-sub">${lang === 'es' ? d.sub_es : d.sub_en}</div>
    </div>`;
  }).join('');
}

function selectType(type) { inspType = type; renderTypeGrid(); checkCanStart(); }

// ── Driver search ──────────────────────────────────────────────────
function onDriverSearch(val) {
  selectedDriver = null;
  document.getElementById('driverBadge').style.display = 'none';
  const drop = document.getElementById('driverDrop');
  if (!val.trim()) { drop.classList.remove('open'); checkCanStart(); return; }
  const q = val.toLowerCase();
  const matches = allPeople.filter(p => p.name.toLowerCase().includes(q)).slice(0, 10);
  const exactMatch = allPeople.find(p => p.name.toLowerCase() === q);
  window._driverCandidates = [...matches];
  if (!exactMatch && val.trim().length >= 2) window._driverCandidates.push({ id: null, name: val.trim(), isNew: true });
  // Use data-idx attribute instead of inline onclick
  drop.innerHTML = window._driverCandidates.map((p, i) => `
    <div class="driver-opt" data-idx="${i}">
      <div class="driver-opt-name">${p.name}${p.isNew ? `<span class="new-tag">${t('newTag')}</span>` : ''}</div>
      ${p.isNew ? `<div class="driver-opt-sub">${lang === 'es' ? 'Registrar nuevo conductor' : 'Register as new driver'}</div>` : ''}
    </div>`).join('') || `<div class="driver-opt" style="color:var(--gray);font-size:13px">${lang === 'es' ? 'Sin resultados' : 'No results'}</div>`;
  drop.classList.add('open');
  checkCanStart();
}

function pickDriver(idx) {
  const d = (window._driverCandidates||[])[idx];
  if (!d) return;
  selectedDriver = d;
  document.getElementById('driverInput').value = d.name;
  document.getElementById('driverDrop').classList.remove('open');
  document.getElementById('driverBadge').style.display = 'flex';
  document.getElementById('driverBadgeName').textContent = d.name + (d.isNew ? ` (${t('newTag')})` : '');
  checkCanStart();
}

function clearDriver() {
  selectedDriver = null;
  document.getElementById('driverInput').value = '';
  document.getElementById('driverBadge').style.display = 'none';
  checkCanStart();
}

function checkCanStart() {
  const ok = asset && inspType && selectedDriver;
  const btn = document.getElementById('startBtn');
  if (!btn) return;
  btn.disabled = !ok;
  if (!ok) {
    const missing = [];
    if (!inspType) missing.push(lang === 'es' ? 'tipo' : 'type');
    if (!selectedDriver) missing.push(lang === 'es' ? 'conductor' : 'driver');
    btn.textContent = missing.length ? (lang === 'es' ? 'Seleccione: ' : 'Select: ') + missing.join(' & ') : t('startBtn');
  } else {
    btn.textContent = t('startBtn');
  }
}

// Resolve which form to use for an asset: asset-level override first, then team default.
async function resolveFormId(assetObj, inspType, language) {
  // Asset-level override (e.g. blower trucks needing different items than their team's default)
  const af = await fetch(`${SUPA}/rest/v1/asset_inspection_forms?asset_id=eq.${assetObj.id}&inspection_type=eq.${inspType}&lang=eq.${language}&is_active=eq.true&select=form_id&limit=1`, { headers: H });
  let formId = (await af.json())?.[0]?.form_id;
  if (formId) return formId;
  if (!formId && language === 'es') {
    const af2 = await fetch(`${SUPA}/rest/v1/asset_inspection_forms?asset_id=eq.${assetObj.id}&inspection_type=eq.${inspType}&lang=eq.en&is_active=eq.true&select=form_id&limit=1`, { headers: H });
    formId = (await af2.json())?.[0]?.form_id;
    if (formId) return formId;
  }

  // Team-level default (existing behavior)
  const r = await fetch(`${SUPA}/rest/v1/team_inspection_forms?team_id=eq.${assetObj.team_id}&inspection_type=eq.${inspType}&lang=eq.${language}&is_active=eq.true&select=form_id&limit=1`, { headers: H });
  const data = await r.json();
  formId = data?.[0]?.form_id;
  if (!formId && language === 'es') {
    const r2 = await fetch(`${SUPA}/rest/v1/team_inspection_forms?team_id=eq.${assetObj.team_id}&inspection_type=eq.${inspType}&lang=eq.en&is_active=eq.true&select=form_id&limit=1`, { headers: H });
    formId = (await r2.json())?.[0]?.form_id;
  }
  return formId;
}

// ── Start inspection ───────────────────────────────────────────────
async function startInspection() {
  if (!asset || !inspType || !selectedDriver) return;
  showLoading(true, t('loading'));
  try {
    const formId = await resolveFormId(asset, inspType, lang);
    if (!formId) { showLoading(false); showError('setupError', 'No form found for this asset.'); return; }
    const ri = await fetch(`${SUPA}/rest/v1/inspection_form_items?form_id=eq.${formId}&is_active=eq.true&order=order_index`, { headers: H });
    formItems = await ri.json();
    responses = {};
    defectPhotos = {};
    showLoading(false);
    showScreen('screenChecklist');
    document.getElementById('checklistAssetLabel').textContent = asset.asset_number;
    renderChecklist();
  } catch(e) { showLoading(false); showError('setupError', 'Failed to load form.'); }
}

// ── Checklist ──────────────────────────────────────────────────────
function renderChecklist() {
  const container = document.getElementById('checklistCard');
  if (!container) return;
  let html = '';
  formItems.forEach(item => {
    if (item.item_type === 'signature') return;
    const resp = responses[item.id] || {};
    const label = (lang === 'es' && item.title_es) ? item.title_es : item.title;
    const hasFail = resp.value === 'fail';

    if (item.item_type === 'pass_fail') {
      html += `<div class="check-item" id="ci-${item.id}">
        <div class="check-row">
          <div class="check-label${hasFail ? ' failed' : ''}">${label}</div>
          <div class="pf-wrap">
            <button class="pf-btn${resp.value === 'pass' ? ' pass' : ''}" data-item-id="${item.id}" data-value="pass">${t('pass')}</button>
            <button class="pf-btn${hasFail ? ' fail' : ''}" data-item-id="${item.id}" data-value="fail">${t('fail')}</button>
          </div>
        </div>
        ${hasFail ? renderDefectPanel(item, resp) : ''}
      </div>`;
    } else if (item.item_type === 'number') {
      html += `<div class="check-item" id="ci-${item.id}">
        <div class="check-row" style="flex-direction:column;align-items:flex-start">
          <div class="check-label">${label}</div>
          <input type="number" class="check-number" data-item-id="${item.id}" placeholder="0" value="${resp.value || ''}">
        </div>
      </div>`;
    } else if (item.item_type === 'text') {
      html += `<div class="check-item" id="ci-${item.id}">
        <div class="check-row" style="flex-direction:column;align-items:flex-start">
          <div class="check-label">${label}</div>
          <textarea class="check-textarea" data-item-id="${item.id}" placeholder="${lang === 'es' ? 'Notas...' : 'Notes...'}">${resp.value || ''}</textarea>
        </div>
      </div>`;
    }
  });
  container.innerHTML = html;
  updateProgress();
  Object.keys(defectPhotos).forEach(itemId => renderPhotoPreviews(itemId));
}

function renderDefectPanel(item, resp) {
  const sev = resp.severity || '';
  const photos = defectPhotos[item.id] || [];
  const thumbs = photos.map((p, i) => `
    <div class="photo-thumb">
      <img src="${p.previewUrl}" alt="">
      <button class="photo-remove" data-item-id="${item.id}" data-idx="${i}">×</button>
    </div>`).join('');
  return `<div class="defect-panel" id="dp-${item.id}">
    <div class="defect-panel-title">${t('defectLabel')}</div>
    <textarea class="defect-textarea" data-item-id="${item.id}" placeholder="${t('defectLabel')}...">${resp.notes || ''}</textarea>
    <div class="sev-row">
      <button class="sev-btn minor${sev === 'minor' ? ' sel' : ''}" data-item-id="${item.id}" data-sev="minor">${t('sev').minor}</button>
      <button class="sev-btn critical${sev === 'critical' ? ' sel' : ''}" data-item-id="${item.id}" data-sev="critical">${t('sev').critical}</button>
    </div>
    <label class="photo-upload-btn">
      ${t('addPhoto')}
      <input type="file" class="photo-file-input" data-item-id="${item.id}" accept="image/*" capture="environment" multiple>
    </label>
    <div class="photo-preview-wrap" id="photos-${item.id}">${thumbs}</div>
    <div class="photo-uploading" id="photoStatus-${item.id}"></div>
  </div>`;
}

function setResp(id, value, skipRender) {
  if (!responses[id]) responses[id] = {};
  responses[id].value = value;
  if (value === 'fail' && !responses[id].severity) responses[id].severity = 'minor';
  updateProgress();
  if (!skipRender) renderChecklist();
}

function setDefectNote(id, val) { if (!responses[id]) responses[id] = {}; responses[id].notes = val; }
function setSev(id, sev) { if (!responses[id]) responses[id] = {}; responses[id].severity = sev; renderChecklist(); }

function updateProgress() {
  const pfItems = formItems.filter(i => i.item_type === 'pass_fail');
  const answered = pfItems.filter(i => responses[i.id]?.value).length;
  const total = pfItems.length;
  const pct = total ? Math.round(answered / total * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${answered} of ${total}`;
  document.getElementById('progressPct').textContent = pct + '%';
}

// ── Photo handling ─────────────────────────────────────────────────
function onPhotoSelected(itemId, input) {
  if (!defectPhotos[itemId]) defectPhotos[itemId] = [];
  Array.from(input.files).forEach(file => {
    defectPhotos[itemId].push({ file, previewUrl: URL.createObjectURL(file), storagePath: null, uploaded: false });
  });
  input.value = '';
  renderPhotoPreviews(itemId);
}

function renderPhotoPreviews(itemId) {
  const wrap = document.getElementById('photos-' + itemId);
  if (!wrap) return;
  const photos = defectPhotos[itemId] || [];
  wrap.innerHTML = photos.map((p, i) => `
    <div class="photo-thumb">
      <img src="${p.previewUrl}" alt="">
      <button class="photo-remove" data-item-id="${itemId}" data-idx="${i}">×</button>
    </div>`).join('');
}

function removePhoto(itemId, idx) {
  const photos = defectPhotos[itemId] || [];
  if (photos[idx]) URL.revokeObjectURL(photos[idx].previewUrl);
  photos.splice(idx, 1);
  defectPhotos[itemId] = photos;
  renderPhotoPreviews(itemId);
}

async function uploadDefectPhotos(assetId) {
  for (const [itemId, photos] of Object.entries(defectPhotos)) {
    for (let i = 0; i < photos.length; i++) {
      const p = photos[i];
      if (p.uploaded) continue;
      const statusEl = document.getElementById('photoStatus-' + itemId);
      if (statusEl) statusEl.textContent = `Uploading photo ${i + 1} of ${photos.length}...`;
      try {
        const ext = p.file.name.split('.').pop().toLowerCase();
        const path = `${assetId}/${Date.now()}_defect_${Math.random().toString(36).slice(2)}.${ext}`;
        const upRes = await fetch(`${SUPA}/storage/v1/object/${BUCKET}/${path}`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${KEY}`, 'Content-Type': p.file.type },
          body: p.file
        });
        if (upRes.ok) { p.storagePath = path; p.uploaded = true; }
      } catch(e) { console.error('Photo upload failed:', e); }
    }
  }
}

// ── Certification ──────────────────────────────────────────────────
function onCertChange() {
  document.getElementById('submitBtn').disabled = !document.getElementById('certCheck')?.checked;
}

function goBack() { showScreen('screenSetup'); }

// ── Submit ─────────────────────────────────────────────────────────
async function submitInspection() {
  showLoading(true, t('submitting'));
  try {
    await uploadDefectPhotos(asset.id);

    let driverId = selectedDriver.id;
    if (selectedDriver.isNew) {
      const parts = selectedDriver.name.trim().split(/\s+/);
      const cr = await fetch(`${SUPA}/rest/v1/rpc/upsert_person`, {
        method: 'POST', headers: H,
        body: JSON.stringify({ p_first_name: parts[0], p_last_name: parts.slice(1).join(' ') || '' })
      });
      driverId = await cr.json();
    }

    const formId = await resolveFormId(asset, inspType, lang);
    if (!formId) throw new Error('No form found');

    const respRows = formItems.filter(i => i.item_type !== 'signature').map(item => {
      const resp = responses[item.id] || {};
      return {
        form_item_id: item.id,
        pass_fail_value: item.item_type === 'pass_fail' ? (resp.value || null) : null,
        number_value: item.item_type === 'number' ? (resp.value ? parseFloat(resp.value) : null) : null,
        text_value: item.item_type === 'text' ? (resp.value || null) : null,
        notes: resp.notes || null,
      };
    });

    const failures = formItems.filter(i => responses[i.id]?.value === 'fail');
    const defectRows = failures.map(item => {
      const photos = (defectPhotos[item.id] || []).filter(p => p.storagePath).map(p => p.storagePath);
      return {
        description: (lang === 'es' && item.title_es ? item.title_es : item.title) + (responses[item.id].notes ? ': ' + responses[item.id].notes : ''),
        severity: responses[item.id].severity || 'minor',
        photo_paths: photos,
      };
    });

    const rpc = await fetch(`${SUPA}/rest/v1/rpc/submit_inspection_v2`, {
      method: 'POST', headers: H,
      body: JSON.stringify({
        p_form_id: formId,
        p_asset_id: asset.id,
        p_team_id: asset.team_id,
        p_inspector_id: driverId,
        p_status: failures.length > 0 ? 'failed' : 'passed',
        p_date_inspected: new Date().toISOString(),
        p_responses: respRows,
        p_defects: defectRows,
      })
    });
    const result = await rpc.json();
    if (!result?.success) throw new Error('Submission failed: ' + JSON.stringify(result));

    showLoading(false);
    showScreen('screenSuccess');
    document.getElementById('successTitle').textContent = t('successTitle');
    document.getElementById('successSub').textContent = t('successSub');
    document.getElementById('newInspBtn').textContent = t('newInsp');
    if (failures.length) {
      document.getElementById('successDefect').innerHTML =
        `<div style="margin-top:12px;text-align:left">
          <div style="font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--red);margin-bottom:8px">
            ${failures.length} defect${failures.length > 1 ? 's' : ''} reported — work order${failures.length > 1 ? 's' : ''} opened
          </div>
          ${failures.map(item => {
            const resp = responses[item.id];
            const sev = resp?.severity || 'minor';
            const note = resp?.notes ? ': ' + resp.notes : '';
            const sevColor = sev === 'critical' ? 'var(--red)' : 'var(--amber)';
            return `<div style="background:#fff;border-left:3px solid ${sevColor};padding:8px 10px;margin-bottom:6px;font-size:13px">
              <div style="font-weight:600;color:var(--ink)">${item.title}${note}</div>
              <div style="font-family:var(--mono);font-size:10px;color:${sevColor};margin-top:2px;text-transform:uppercase">${sev} · work order opened</div>
            </div>`;
          }).join('')}
        </div>`;
    }
  } catch(e) {
    showLoading(false);
    alert('Submission failed:\n\n' + e.message);
  }
}

function resetAll() {
  asset = null; teamRef = null; inspType = null; selectedDriver = null;
  formItems = []; responses = {}; defectPhotos = {};
  document.getElementById('driverInput').value = '';
  document.getElementById('driverBadge').style.display = 'none';
  document.getElementById('certCheck').checked = false;
  document.getElementById('successDefect').textContent = '';
  clearError('setupError');
  showScreen('screenSetup');
  init();
}

function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function showLoading(show, msg) { const el = document.getElementById('loadingOverlay'); el.classList.toggle('show', show); if (msg) document.getElementById('loadingText').textContent = msg; }
function showError(id, msg) { const el = document.getElementById(id); if (el) { el.textContent = msg; el.classList.add('show'); } }
function clearError(id) { const el = document.getElementById(id); if (el) { el.textContent = ''; el.classList.remove('show'); } }

init();
</script>
</body>
</html>
