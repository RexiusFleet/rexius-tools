<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rexius Fleet — Manager Portal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@300;400;500;600&display=swap');

:root {
  --ink: #0a0a0a;
  --paper: #fafaf8;
  --surface: #f3f2ee;
  --border: #d8d6d0;
  --border-dark: #a8a69e;
  --green: #1a5c32;
  --green-mid: #2d7d4a;
  --green-light: #e8f5ee;
  --red: #8b1a1a;
  --red-light: #fdf0f0;
  --amber: #7a4a00;
  --amber-light: #fef8ec;
  --blue: #1a3c6e;
  --blue-light: #eef3fb;
  --mono: 'IBM Plex Mono', monospace;
  --display: 'Barlow Condensed', sans-serif;
  --body: 'Barlow', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { font-family: var(--body); background: var(--surface); color: var(--ink); -webkit-font-smoothing: antialiased; }

/* ── LOGIN ─────────────────────────────────────── */
#loginScreen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--ink);
  background-image: repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,.03) 39px, rgba(255,255,255,.03) 40px),
                    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,.03) 39px, rgba(255,255,255,.03) 40px);
}
.login-box {
  background: var(--paper);
  border: 1px solid #333;
  width: 100%;
  max-width: 420px;
  padding: 40px;
}
.login-wordmark { font-family: var(--display); font-size: 11px; font-weight: 600; letter-spacing: .25em; text-transform: uppercase; color: var(--green); margin-bottom: 6px; }
.login-title { font-family: var(--display); font-size: 32px; font-weight: 700; letter-spacing: -.01em; color: var(--ink); margin-bottom: 4px; line-height: 1; }
.login-sub { font-size: 13px; color: #666; margin-bottom: 28px; }
.login-divider { height: 1px; background: var(--border); margin-bottom: 24px; }
.login-label { display: block; font-family: var(--mono); font-size: 11px; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; color: #555; margin-bottom: 6px; }
.login-input {
  width: 100%; font-family: var(--body); font-size: 15px;
  padding: 11px 14px; border: 1px solid var(--border);
  background: var(--paper); color: var(--ink);
  margin-bottom: 14px; outline: none;
  transition: border-color .15s;
}
.login-input:focus { border-color: var(--green); }
.login-btn {
  width: 100%; font-family: var(--display); font-size: 16px; font-weight: 700;
  letter-spacing: .08em; text-transform: uppercase;
  padding: 13px; border: none; background: var(--ink); color: var(--paper);
  cursor: pointer; transition: background .12s; margin-top: 4px;
}
.login-btn:hover { background: var(--green); }
.login-error { font-size: 12px; color: var(--red); margin-top: 8px; display: none; }
.login-error.show { display: block; }

/* ── APP SHELL ─────────────────────────────────── */
#appShell { display: none; flex-direction: column; min-height: 100vh; }
#appShell.active { display: flex; }

.topbar {
  background: var(--ink);
  color: var(--paper);
  padding: 0 24px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 2px solid var(--green);
  position: sticky; top: 0; z-index: 100;
  flex-shrink: 0;
}
.topbar-left { display: flex; align-items: center; gap: 20px; }
.topbar-brand { font-family: var(--display); font-size: 15px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--green); }
.topbar-title { font-family: var(--display); font-size: 14px; font-weight: 500; letter-spacing: .06em; color: rgba(255,255,255,.6); text-transform: uppercase; }
.topbar-right { display: flex; align-items: center; gap: 14px; }
.topbar-user { font-family: var(--mono); font-size: 11px; color: rgba(255,255,255,.5); }
.topbar-user span { color: var(--green); font-weight: 600; }
.logout-btn { font-family: var(--mono); font-size: 11px; color: rgba(255,255,255,.4); background: none; border: 1px solid rgba(255,255,255,.15); padding: 4px 10px; cursor: pointer; transition: all .12s; }
.logout-btn:hover { border-color: var(--green); color: var(--green); }

.main { display: flex; flex: 1; overflow: hidden; }

/* ── SIDEBAR ───────────────────────────────────── */
.sidebar {
  width: 260px; flex-shrink: 0;
  background: var(--paper);
  border-right: 1px solid var(--border);
  padding: 20px 0;
  overflow-y: auto;
}
.sidebar-section { margin-bottom: 24px; }
.sidebar-heading { font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: #aaa; padding: 0 20px; margin-bottom: 6px; }
.sidebar-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 20px; font-size: 13px; font-weight: 500;
  color: #555; cursor: pointer; transition: all .1s;
  border-left: 2px solid transparent;
}
.sidebar-item:hover { background: var(--surface); color: var(--ink); }
.sidebar-item.active { background: var(--green-light); color: var(--green); border-left-color: var(--green); font-weight: 600; }
.sidebar-item .icon { font-size: 14px; width: 18px; text-align: center; }

/* Filter panel */
.filter-panel { padding: 16px 20px; border-top: 1px solid var(--border); margin-top: 8px; }
.filter-label { font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: #aaa; margin-bottom: 6px; display: block; }
.filter-input, .filter-select {
  width: 100%; font-family: var(--body); font-size: 13px;
  padding: 7px 10px; border: 1px solid var(--border);
  background: var(--paper); color: var(--ink);
  margin-bottom: 10px; outline: none;
}
.filter-input:focus, .filter-select:focus { border-color: var(--green); }
.filter-row { display: flex; gap: 8px; }
.filter-row .filter-input { margin-bottom: 0; }
.apply-btn {
  width: 100%; font-family: var(--display); font-size: 13px; font-weight: 700;
  letter-spacing: .06em; text-transform: uppercase;
  padding: 9px; border: none; background: var(--green); color: #fff;
  cursor: pointer; margin-top: 10px; transition: opacity .12s;
}
.apply-btn:hover { opacity: .88; }

/* ── CONTENT ───────────────────────────────────── */
.content-area { flex: 1; overflow-y: auto; padding: 24px; }

/* Stat cards */
.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.stat-card { background: var(--paper); border: 1px solid var(--border); padding: 16px 18px; position: relative; overflow: hidden; }
.stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
.stat-card.green::before { background: var(--green); }
.stat-card.amber::before { background: #d97706; }
.stat-card.red::before { background: #dc2626; }
.stat-card.blue::before { background: #2563eb; }
.stat-num { font-family: var(--display); font-size: 36px; font-weight: 700; line-height: 1; color: var(--ink); }
.stat-label { font-family: var(--mono); font-size: 10px; font-weight: 500; letter-spacing: .1em; text-transform: uppercase; color: #888; margin-top: 4px; }

/* Section header */
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.section-title { font-family: var(--display); font-size: 18px; font-weight: 700; letter-spacing: .02em; text-transform: uppercase; color: var(--ink); }
.section-actions { display: flex; gap: 8px; }
.action-btn {
  font-family: var(--mono); font-size: 11px; font-weight: 500;
  padding: 7px 14px; border: 1px solid var(--border);
  background: var(--paper); color: #444; cursor: pointer;
  transition: all .12s; letter-spacing: .03em; white-space: nowrap;
}
.action-btn:hover { border-color: var(--green); color: var(--green); }
.action-btn.primary { background: var(--ink); border-color: var(--ink); color: var(--paper); }
.action-btn.primary:hover { background: var(--green); border-color: var(--green); }

/* Defect table */
.defect-table { width: 100%; border-collapse: collapse; background: var(--paper); border: 1px solid var(--border); font-size: 13px; }
.defect-table th { font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: #666; background: var(--surface); padding: 9px 12px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
.defect-table td { padding: 10px 12px; border-bottom: 1px solid var(--surface); vertical-align: middle; }
.defect-table tr:last-child td { border-bottom: none; }
.defect-table tr:hover td { background: var(--surface); }
.asset-chip { font-family: var(--mono); font-size: 12px; font-weight: 600; color: var(--ink); }
.sev-pill { font-family: var(--mono); font-size: 10px; font-weight: 600; padding: 3px 8px; letter-spacing: .05em; text-transform: uppercase; }
.sev-minor  { background: var(--amber-light); color: var(--amber); }
.sev-major  { background: #fff7ed; color: #9a3412; }
.sev-critical { background: var(--red-light); color: var(--red); }
.status-pill { font-family: var(--mono); font-size: 10px; font-weight: 600; padding: 3px 8px; letter-spacing: .04em; text-transform: uppercase; }
.st-open { background: var(--blue-light); color: var(--blue); }
.st-progress { background: var(--amber-light); color: var(--amber); }
.st-corrected { background: var(--green-light); color: var(--green); }
.team-tag { font-size: 11px; color: #888; }

/* Access log table */
.log-table { width: 100%; border-collapse: collapse; background: var(--paper); border: 1px solid var(--border); font-size: 12px; }
.log-table th { font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: #666; background: var(--surface); padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); }
.log-table td { padding: 8px 12px; border-bottom: 1px solid var(--surface); font-family: var(--mono); color: #444; }
.log-table tr:last-child td { border-bottom: none; }

/* Empty state */
.empty { text-align: center; padding: 48px 20px; color: #aaa; }
.empty-icon { font-size: 36px; margin-bottom: 10px; opacity: .4; }
.empty p { font-size: 13px; }

/* Loading */
.loading { display: flex; align-items: center; gap: 8px; color: #888; font-size: 13px; padding: 20px; font-family: var(--mono); }
.spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Toast */
.toast { position: fixed; bottom: 24px; right: 24px; background: var(--ink); color: var(--paper); font-family: var(--mono); font-size: 12px; padding: 10px 16px; border-left: 3px solid var(--green); opacity: 0; transform: translateY(8px); transition: all .2s; z-index: 999; pointer-events: none; }
.toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-wordmark">Rexius Forest By-Products</div>
    <div class="login-title">Fleet Manager</div>
    <div class="login-sub">Defect reports &amp; inspection data</div>
    <div class="login-divider"></div>
    <label class="login-label">Your name</label>
    <input class="login-input" id="loginName" placeholder="First Last" autocomplete="name">
    <label class="login-label">Access password</label>
    <input class="login-input" id="loginPass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Access Portal</button>
    <div class="login-error" id="loginError">Incorrect password or name required.</div>
  </div>
</div>

<!-- APP -->
<div id="appShell">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-brand">Rexius Fleet</div>
      <div class="topbar-title">Manager Portal</div>
    </div>
    <div class="topbar-right">
      <div class="topbar-user">Logged in as <span id="topbarUser">—</span></div>
      <button class="logout-btn" onclick="doLogout()">Sign out</button>
    </div>
  </div>

  <div class="main">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-heading">Views</div>
        <div class="sidebar-item active" onclick="showView('defects')" id="nav-defects">
          <span class="icon">⚠</span> Defect Report
        </div>
        <div class="sidebar-item" onclick="showView('inspections')" id="nav-inspections">
          <span class="icon">✓</span> Inspections
        </div>
        <div class="sidebar-item" onclick="showView('accesslog')" id="nav-accesslog">
          <span class="icon">◎</span> Access Log
        </div>
      </div>

      <div class="filter-panel">
        <span class="filter-label">Date range</span>
        <div class="filter-row">
          <input type="date" class="filter-input" id="dateFrom">
          <input type="date" class="filter-input" id="dateTo">
        </div>
        <span class="filter-label" style="margin-top:8px">Severity</span>
        <select class="filter-select" id="filterSev">
          <option value="all">All severities</option>
          <option value="minor">Minor</option>
          <option value="major">Major</option>
          <option value="critical">Critical</option>
        </select>
        <span class="filter-label" style="margin-top:8px">Status</span>
        <select class="filter-select" id="filterStatus">
          <option value="all">All statuses</option>
          <option value="open">Open</option>
          <option value="in_progress">In progress</option>
          <option value="corrected">Corrected</option>
        </select>
        <button class="apply-btn" onclick="applyFilters()">Apply Filters</button>
      </div>
    </div>

    <!-- Content -->
    <div class="content-area" id="contentArea">
      <div class="loading"><div class="spinner"></div>Loading data...</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPA = 'https://toduddkyttuablausist.supabase.co';
const KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvZHVkZGt5dHR1YWJsYXVzaXN0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NjY5MTEsImV4cCI6MjA5NjI0MjkxMX0.ZdtMIuc9kEo7-x0Lr-y2--F1aqkurbLJ0YxeQD2ggDQ';
const H = { apikey: KEY, Authorization: `Bearer ${KEY}`, 'Content-Type': 'application/json' };
const PASSWORD = 'rexius2024';  // ← Change this

let currentUser = null;
let currentView = 'defects';
let allDefects = [];
let allInspections = [];
let allLogs = [];

// ── Date defaults ──────────────────────────────────────────────────
const today = new Date().toISOString().slice(0,10);
const thirtyAgo = new Date(Date.now() - 30*24*60*60*1000).toISOString().slice(0,10);

// ── Login ──────────────────────────────────────────────────────────
function doLogin() {
  const name = document.getElementById('loginName').value.trim();
  const pass = document.getElementById('loginPass').value;
  const err  = document.getElementById('loginError');

  if (!name) { err.textContent = 'Please enter your name.'; err.classList.add('show'); return; }
  if (pass !== PASSWORD) { err.textContent = 'Incorrect password.'; err.classList.add('show'); return; }

  currentUser = name;
  err.classList.remove('show');

  // Log access
  fetch(`${SUPA}/rest/v1/rpc/log_access`, {
    method: 'POST', headers: H,
    body: JSON.stringify({ p_tool_name: 'fleet-manager', p_user_name: name, p_action: 'login', p_metadata: { ua: navigator.userAgent.slice(0,80) } })
  });

  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appShell').classList.add('active');
  document.getElementById('topbarUser').textContent = name;
  document.getElementById('dateFrom').value = thirtyAgo;
  document.getElementById('dateTo').value = today;

  loadAll();
}

function doLogout() {
  fetch(`${SUPA}/rest/v1/rpc/log_access`, {
    method: 'POST', headers: H,
    body: JSON.stringify({ p_tool_name: 'fleet-manager', p_user_name: currentUser, p_action: 'logout' })
  });
  location.reload();
}

// ── Data loading ───────────────────────────────────────────────────
async function loadAll() {
  const from = document.getElementById('dateFrom').value;
  const to   = document.getElementById('dateTo').value;

  try {
    const r = await fetch(`${SUPA}/rest/v1/rpc/get_manager_portal_data`, {
      method: 'POST',
      headers: H,
      body: JSON.stringify({
        p_date_from: from + 'T00:00:00',
        p_date_to:   to   + 'T23:59:59',
      })
    });
    const data = await r.json();
    allDefects     = data.defects     || [];
    allInspections = data.inspections || [];
    allLogs        = data.access_log  || [];
  } catch(e) {
    console.error('loadAll error:', e);
    allDefects = []; allInspections = []; allLogs = [];
  }

  renderCurrentView();
}

function applyFilters() {
  fetch(`${SUPA}/rest/v1/rpc/log_access`, { method: 'POST', headers: H, body: JSON.stringify({ p_tool_name: 'fleet-manager', p_user_name: currentUser, p_action: 'filter_applied' }) });
  loadAll();
}

// ── Views ──────────────────────────────────────────────────────────
function showView(v) {
  currentView = v;
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-' + v).classList.add('active');
  renderCurrentView();
  fetch(`${SUPA}/rest/v1/rpc/log_access`, { method: 'POST', headers: H, body: JSON.stringify({ p_tool_name: 'fleet-manager', p_user_name: currentUser, p_action: 'view_' + v }) });
}

function renderCurrentView() {
  if (currentView === 'defects') renderDefects();
  else if (currentView === 'inspections') renderInspections();
  else if (currentView === 'accesslog') renderAccessLog();
}

// ── Defect view ────────────────────────────────────────────────────
function filteredDefects() {
  const sev    = document.getElementById('filterSev').value;
  const status = document.getElementById('filterStatus').value;
  return allDefects.filter(d =>
    (sev    === 'all' || d.severity === sev) &&
    (status === 'all' || d.status === status)
  );
}

function renderDefects() {
  const defects = filteredDefects();
  const minor    = defects.filter(d => d.severity === 'minor').length;
  const major    = defects.filter(d => d.severity === 'major').length;
  const critical = defects.filter(d => d.severity === 'critical').length;
  const open     = defects.filter(d => d.status === 'open').length;

  let rows = defects.length ? defects.map(d => {
    const asset  = d.asset_number || '—';
    const team   = d.team || '—';
    const driver = (d.driver || '—').trim() || '—';
    const time   = new Date(d.reported_at).toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit', hour12:true });
    return `<tr>
      <td><span class="asset-chip">${asset}</span></td>
      <td><span class="team-tag">${team}</span></td>
      <td>${d.description}</td>
      <td><span class="sev-pill sev-${d.severity}">${d.severity}</span></td>
      <td><span class="status-pill st-${d.status.replace('_','-')}">${d.status.replace('_',' ')}</span></td>
      <td style="font-family:var(--mono);font-size:11px;color:#888">${time}</td>
      <td style="font-size:12px;color:#888">${driver}</td>
    </tr>`;
  }).join('') : `<tr><td colspan="7"><div class="empty"><div class="empty-icon">✓</div><p>No defects in this date range with current filters.</p></div></td></tr>`;

  document.getElementById('contentArea').innerHTML = `
    <div class="stat-grid">
      <div class="stat-card green"><div class="stat-num">${defects.length}</div><div class="stat-label">Total Defects</div></div>
      <div class="stat-card red"><div class="stat-num">${open}</div><div class="stat-label">Open</div></div>
      <div class="stat-card amber"><div class="stat-num">${minor}</div><div class="stat-label">Minor</div></div>
      <div class="stat-card red"><div class="stat-num">${major + critical}</div><div class="stat-label">Major / Critical</div></div>
    </div>
    <div class="section-header">
      <div class="section-title">Defect Report</div>
      <div class="section-actions">
        <button class="action-btn" onclick="downloadDefectPDF()">↓ PDF</button>
        <button class="action-btn primary" onclick="downloadDefectXLSX()">↓ Excel</button>
      </div>
    </div>
    <table class="defect-table">
      <thead><tr>
        <th>Asset</th><th>Team</th><th>Description</th><th>Severity</th><th>Status</th><th>Reported</th><th>Driver</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ── Inspections view ───────────────────────────────────────────────
function renderInspections() {
  const passed  = allInspections.filter(i => i.status === 'passed').length;
  const failed  = allInspections.filter(i => i.status === 'failed').length;

  let rows = allInspections.length ? allInspections.map(i => {
    const asset  = i.asset_number || '—';
    const team   = i.team || '—';
    const driver = (i.driver || '—').trim() || '—';
    const form   = i.form_name || '—';
    const time   = new Date(i.date_inspected).toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit', hour12:true });
    const stClass = i.status === 'passed' ? 'st-corrected' : 'st-open';
    return `<tr>
      <td><span class="asset-chip">${asset}</span></td>
      <td><span class="team-tag">${team}</span></td>
      <td style="font-size:12px">${form}</td>
      <td><span class="status-pill ${stClass}">${i.status}</span></td>
      <td style="font-family:var(--mono);font-size:11px;color:#888">${time}</td>
      <td style="font-size:12px;color:#888">${driver}</td>
    </tr>`;
  }).join('') : `<tr><td colspan="6"><div class="empty"><div class="empty-icon">📋</div><p>No inspections in this date range.</p></div></td></tr>`;

  document.getElementById('contentArea').innerHTML = `
    <div class="stat-grid">
      <div class="stat-card green"><div class="stat-num">${allInspections.length}</div><div class="stat-label">Total Inspections</div></div>
      <div class="stat-card green"><div class="stat-num">${passed}</div><div class="stat-label">Passed</div></div>
      <div class="stat-card red"><div class="stat-num">${failed}</div><div class="stat-label">Failed</div></div>
      <div class="stat-card blue"><div class="stat-num">${[...new Set(allInspections.map(i=>i.asset_number))].length}</div><div class="stat-label">Vehicles</div></div>
    </div>
    <div class="section-header">
      <div class="section-title">Inspection Log</div>
      <div class="section-actions">
        <button class="action-btn primary" onclick="downloadInspXLSX()">↓ Excel</button>
      </div>
    </div>
    <table class="defect-table">
      <thead><tr><th>Asset</th><th>Team</th><th>Form</th><th>Result</th><th>Date / Time</th><th>Driver</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ── Access log view ────────────────────────────────────────────────
function renderAccessLog() {
  let rows = allLogs.length ? allLogs.map(l => {
    const time = new Date(l.accessed_at).toLocaleString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'numeric', minute:'2-digit', hour12:true });
    return `<tr>
      <td>${l.user_name}</td>
      <td>${l.tool_name}</td>
      <td>${l.action}</td>
      <td>${time}</td>
    </tr>`;
  }).join('') : `<tr><td colspan="4"><div class="empty"><div class="empty-icon">◎</div><p>No access log entries.</p></div></td></tr>`;

  document.getElementById('contentArea').innerHTML = `
    <div class="section-header">
      <div class="section-title">Access Log</div>
      <div class="section-actions">
        <button class="action-btn primary" onclick="downloadLogXLSX()">↓ Excel</button>
      </div>
    </div>
    <table class="log-table">
      <thead><tr><th>User</th><th>Tool</th><th>Action</th><th>Timestamp</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ── Downloads ──────────────────────────────────────────────────────
function downloadDefectXLSX() {
  const defects = filteredDefects();
  const from = document.getElementById('dateFrom').value;
  const to   = document.getElementById('dateTo').value;
  const rows = defects.map(d => ({
    'Asset':       d.asset_number || '',
    'Team':        d.team || '',
    'Year':        d.year || '',
    'Make':        d.make || '',
    'Model':       d.model || '',
    'Description': d.description,
    'Severity':    d.severity,
    'Status':      d.status,
    'Driver':      (d.driver||'').trim(),
    'Reported At': new Date(d.reported_at).toLocaleString(),
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [10,14,6,10,14,40,8,12,18,20].map(w => ({wch:w}));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Defects');
  XLSX.writeFile(wb, `rexius_defects_${from}_to_${to}.xlsx`);
  logDownload('defect_xlsx');
  showToast('Defect report downloaded');
}

function downloadDefectPDF() {
  const defects = filteredDefects();
  const from = document.getElementById('dateFrom').value;
  const to   = document.getElementById('dateTo').value;
  const win = window.open('', '_blank');
  const rows = defects.map(d => {
    const time = new Date(d.reported_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    return `<tr><td>${d.asset_number||'—'}</td><td>${d.team||'—'}</td><td>${d.description}</td><td>${d.severity}</td><td>${d.status}</td><td>${time}</td><td>${d.people?(d.people.first_name+' '+(d.people.last_name||'')).trim():'—'}</td></tr>`;
  }).join('');
  win.document.write(`<!DOCTYPE html><html><head><title>Rexius Fleet — Defect Report</title>
  <style>body{font-family:Arial,sans-serif;font-size:11px;padding:24px;color:#111}
  h1{font-size:18px;margin-bottom:4px}p{color:#666;margin-bottom:16px;font-size:11px}
  table{width:100%;border-collapse:collapse}th{background:#1a5c32;color:#fff;padding:6px 8px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.05em}
  td{padding:6px 8px;border-bottom:1px solid #eee;font-size:11px}tr:nth-child(even) td{background:#f9f9f7}
  @media print{button{display:none}}</style></head><body>
  <h1>Rexius Fleet — Defect Report</h1>
  <p>${from} to ${to} · ${defects.length} defect${defects.length!==1?'s':''} · Generated ${new Date().toLocaleString()} · By ${currentUser}</p>
  <table><thead><tr><th>Asset</th><th>Team</th><th>Description</th><th>Severity</th><th>Status</th><th>Date</th><th>Driver</th></tr></thead>
  <tbody>${rows}</tbody></table>
  <script>window.print();<\/script></body></html>`);
  win.document.close();
  logDownload('defect_pdf');
  showToast('PDF opened for printing');
}

function downloadInspXLSX() {
  const from = document.getElementById('dateFrom').value;
  const to   = document.getElementById('dateTo').value;
  const rows = allInspections.map(i => ({
    'Asset':     i.asset_number || '',
    'Team':      i.team || '',
    'Year':      i.year || '',
    'Make':      i.make || '',
    'Model':     i.model || '',
    'Form':      i.form_name || '',
    'Result':    i.status,
    'Driver':    (i.driver||'').trim(),
    'Date':      new Date(i.date_inspected).toLocaleString(),
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [10,14,6,10,14,26,10,18,20].map(w=>({wch:w}));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Inspections');
  XLSX.writeFile(wb, `rexius_inspections_${from}_to_${to}.xlsx`);
  logDownload('inspection_xlsx');
  showToast('Inspection log downloaded');
}

function downloadLogXLSX() {
  const rows = allLogs.map(l => ({ 'User': l.user_name, 'Tool': l.tool_name, 'Action': l.action, 'Timestamp': new Date(l.accessed_at).toLocaleString() }));
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Access Log');
  XLSX.writeFile(wb, `rexius_access_log_${today}.xlsx`);
  showToast('Access log downloaded');
}

function logDownload(type) {
  fetch(`${SUPA}/rest/v1/rpc/log_access`, { method: 'POST', headers: H, body: JSON.stringify({ p_tool_name: 'fleet-manager', p_user_name: currentUser, p_action: 'download_' + type }) });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
