<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rexius Fleet — Daily Defect Digest</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f3f4f6; color: #111827; min-height: 100vh; }
.page { max-width: 720px; margin: 0 auto; padding: 24px 16px; }

/* Header */
.header { background: #15803d; color: #fff; border-radius: 10px 10px 0 0; padding: 24px 28px; }
.header-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 4px; }
.brand { font-size: 12px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; opacity: .75; }
.report-date { font-size: 12px; opacity: .75; }
.header h1 { font-size: 22px; font-weight: 700; }
.header-sub { font-size: 13px; opacity: .8; margin-top: 4px; }

/* Summary bar */
.summary-bar { background: #fff; border-left: 1px solid #e5e7eb; border-right: 1px solid #e5e7eb; padding: 16px 28px; display: flex; gap: 24px; border-bottom: 2px solid #f3f4f6; }
.stat { text-align: center; }
.stat-num { font-size: 28px; font-weight: 700; color: #15803d; line-height: 1; }
.stat-num.red { color: #dc2626; }
.stat-num.amber { color: #d97706; }
.stat-label { font-size: 11px; color: #6b7280; margin-top: 2px; text-transform: uppercase; letter-spacing: .05em; }

/* Defect cards */
.defects-wrap { background: #fff; border: 1px solid #e5e7eb; border-top: none; border-radius: 0 0 10px 10px; padding: 20px 28px; }
.section-title { font-size: 12px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: #6b7280; margin-bottom: 12px; }
.defect-card { border: 1px solid #e5e7eb; border-radius: 8px; margin-bottom: 10px; overflow: hidden; }
.defect-card:last-child { margin-bottom: 0; }
.defect-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: #f9fafb; border-bottom: 1px solid #f0f0ee; }
.defect-asset { font-size: 15px; font-weight: 700; font-family: monospace; color: #111827; }
.defect-vehicle { font-size: 12px; color: #6b7280; margin-top: 1px; }
.sev-badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: .05em; }
.sev-minor  { background: #fef3c7; color: #92400e; }
.sev-major  { background: #ffedd5; color: #9a3412; }
.sev-critical { background: #fee2e2; color: #991b1b; }
.defect-body { padding: 10px 14px; }
.defect-desc { font-size: 14px; color: #374151; font-weight: 500; margin-bottom: 6px; }
.defect-meta { display: flex; gap: 16px; font-size: 12px; color: #9ca3af; }
.defect-team { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 10px; background: #dcfce7; color: #166534; margin-right: 6px; }

/* Empty state */
.empty { text-align: center; padding: 40px 20px; color: #9ca3af; }
.empty-icon { font-size: 40px; margin-bottom: 10px; }
.empty p { font-size: 14px; }

/* Controls */
.controls { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.ctrl-btn { font-family: inherit; font-size: 13px; font-weight: 500; padding: 7px 14px; border-radius: 7px; border: 1px solid #e5e7eb; background: #fff; color: #374151; cursor: pointer; transition: all .12s; }
.ctrl-btn:hover { border-color: #15803d; color: #15803d; }
.ctrl-btn.active { background: #15803d; border-color: #15803d; color: #fff; }
.ctrl-select { font-family: inherit; font-size: 13px; padding: 7px 11px; border-radius: 7px; border: 1px solid #e5e7eb; background: #fff; color: #374151; cursor: pointer; }
.date-input { font-family: inherit; font-size: 13px; padding: 7px 11px; border-radius: 7px; border: 1px solid #e5e7eb; background: #fff; color: #374151; }
.date-input:focus, .ctrl-select:focus { outline: 2px solid #15803d; outline-offset: 1px; }
.load-btn { font-family: inherit; font-size: 13px; font-weight: 600; padding: 7px 18px; border-radius: 7px; border: none; background: #15803d; color: #fff; cursor: pointer; }
.load-btn:hover { opacity: .88; }

/* Email config */
.email-bar { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 14px 16px; margin-bottom: 16px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.email-label { font-size: 12px; font-weight: 600; color: #6b7280; white-space: nowrap; }
.email-input { font-family: inherit; font-size: 13px; padding: 6px 10px; border-radius: 6px; border: 1px solid #e5e7eb; flex: 1; min-width: 200px; }
.send-btn { font-family: inherit; font-size: 13px; font-weight: 600; padding: 7px 16px; border-radius: 7px; border: none; background: #2563eb; color: #fff; cursor: pointer; white-space: nowrap; }
.send-btn:hover { opacity: .88; }
.send-btn:disabled { background: #9ca3af; cursor: not-allowed; }

.status-msg { font-size: 13px; padding: 8px 12px; border-radius: 6px; margin-bottom: 12px; display: none; }
.status-msg.success { background: #dcfce7; color: #166534; border: 1px solid #86efac; display: block; }
.status-msg.error { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; display: block; }
.status-msg.info { background: #dbeafe; color: #1d4ed8; border: 1px solid #93c5fd; display: block; }

.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #e5e7eb; border-top-color: #15803d; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="page">

  <!-- Controls -->
  <div class="controls">
    <input type="date" class="date-input" id="reportDate">
    <select class="ctrl-select" id="sevFilter">
      <option value="minor">Minor defects</option>
      <option value="major">Major defects</option>
      <option value="critical">Critical defects</option>
      <option value="all">All severities</option>
    </select>
    <button class="load-btn" onclick="loadReport()">Load Report</button>
    <span id="loadStatus"></span>
  </div>

  <!-- Email bar -->
  <div class="email-bar">
    <span class="email-label">Send to:</span>
    <input class="email-input" type="email" id="recipientEmail" placeholder="mechanic@rexius.com">
    <input class="email-input" type="text" id="recipientName" placeholder="Recipient name" style="max-width:180px">
    <button class="send-btn" id="sendBtn" onclick="sendReport()" disabled>✉ Send Email</button>
  </div>

  <div class="status-msg" id="statusMsg"></div>

  <!-- Report -->
  <div id="reportWrap"></div>
</div>

<script>
const SUPA = 'https://toduddkyttuablausist.supabase.co';
const KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvZHVkZGt5dHR1YWJsYXVzaXN0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NjY5MTEsImV4cCI6MjA5NjI0MjkxMX0.ZdtMIuc9kEo7-x0Lr-y2--F1aqkurbLJ0YxeQD2ggDQ';
const H = { apikey: KEY, Authorization: `Bearer ${KEY}`, 'Content-Type': 'application/json' };

let currentReport = null;

// Set default date to today
document.getElementById('reportDate').value = new Date().toISOString().slice(0,10);

async function loadReport() {
  const date = document.getElementById('reportDate').value;
  const sev = document.getElementById('sevFilter').value;
  const ls = document.getElementById('loadStatus');
  ls.innerHTML = '<span class="spinner"></span>Loading...';

  try {
    const r = await fetch(`${SUPA}/rest/v1/rpc/get_daily_defect_digest`, {
      method: 'POST',
      headers: H,
      body: JSON.stringify({ p_severity: sev === 'all' ? 'minor' : sev, p_date: date })
    });
    const data = await r.json();
    currentReport = data;

    // If "all" selected, also fetch major and critical and merge
    if (sev === 'all') {
      const [majR, critR] = await Promise.all([
        fetch(`${SUPA}/rest/v1/rpc/get_daily_defect_digest`, { method: 'POST', headers: H, body: JSON.stringify({ p_severity: 'major', p_date: date }) }).then(r=>r.json()),
        fetch(`${SUPA}/rest/v1/rpc/get_daily_defect_digest`, { method: 'POST', headers: H, body: JSON.stringify({ p_severity: 'critical', p_date: date }) }).then(r=>r.json()),
      ]);
      const allDefects = [
        ...(data.defects || []),
        ...(majR.defects || []),
        ...(critR.defects || []),
      ].sort((a,b) => new Date(a.reported_at) - new Date(b.reported_at));
      currentReport = { ...data, defects: allDefects, total_defects: allDefects.length, severity: 'all' };
    }

    renderReport(currentReport);
    document.getElementById('sendBtn').disabled = !currentReport?.total_defects;
    ls.innerHTML = '';
  } catch(e) {
    ls.innerHTML = '<span style="color:#dc2626">Failed to load</span>';
    console.error(e);
  }
}

function renderReport(data) {
  const wrap = document.getElementById('reportWrap');
  const defects = data.defects || [];
  const dateStr = new Date(data.report_date + 'T12:00:00').toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  const minor = defects.filter(d => d.severity === 'minor').length;
  const major = defects.filter(d => d.severity === 'major').length;
  const critical = defects.filter(d => d.severity === 'critical').length;

  // Group by team
  const byTeam = {};
  defects.forEach(d => {
    const team = d.team || 'Unassigned';
    if (!byTeam[team]) byTeam[team] = [];
    byTeam[team].push(d);
  });

  let cardsHtml = '';
  if (!defects.length) {
    cardsHtml = `<div class="empty"><div class="empty-icon">✅</div><p>No open ${data.severity} defects reported on this date.</p></div>`;
  } else {
    Object.entries(byTeam).sort().forEach(([team, items]) => {
      cardsHtml += `<div class="section-title" style="margin-top:16px">${team} — ${items.length} defect${items.length!==1?'s':''}</div>`;
      items.forEach(d => {
        const time = new Date(d.reported_at).toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit', hour12:true });
        const sevClass = `sev-${d.severity}`;
        const vehicle = [d.year, d.make, d.model].filter(Boolean).join(' ') || 'Unknown vehicle';
        cardsHtml += `<div class="defect-card">
          <div class="defect-header">
            <div>
              <div class="defect-asset">${d.asset_number}</div>
              <div class="defect-vehicle">${vehicle}</div>
            </div>
            <span class="sev-badge ${sevClass}">${d.severity}</span>
          </div>
          <div class="defect-body">
            <div class="defect-desc">${d.description}</div>
            <div class="defect-meta">
              <span>👤 ${d.reported_by || 'Unknown'}</span>
              <span>🕐 ${time}</span>
              <span>📋 ${d.status}</span>
            </div>
          </div>
        </div>`;
      });
    });
  }

  wrap.innerHTML = `
    <div class="header">
      <div class="header-top">
        <div class="brand">Rexius Fleet</div>
        <div class="report-date">${dateStr}</div>
      </div>
      <h1>Daily Defect Digest</h1>
      <div class="header-sub">${data.total_defects} open defect${data.total_defects!==1?'s':''} · ${data.severity === 'all' ? 'All severities' : data.severity.charAt(0).toUpperCase()+data.severity.slice(1)+' severity'}</div>
    </div>
    <div class="summary-bar">
      <div class="stat"><div class="stat-num">${data.total_defects}</div><div class="stat-label">Total Open</div></div>
      <div class="stat"><div class="stat-num amber">${minor}</div><div class="stat-label">Minor</div></div>
      <div class="stat"><div class="stat-num" style="color:#ea580c">${major}</div><div class="stat-label">Major</div></div>
      <div class="stat"><div class="stat-num red">${critical}</div><div class="stat-label">Critical</div></div>
      <div class="stat"><div class="stat-num" style="color:#6b7280">${Object.keys(byTeam).length}</div><div class="stat-label">Teams</div></div>
    </div>
    <div class="defects-wrap">${cardsHtml}</div>`;
}

async function sendReport() {
  const email = document.getElementById('recipientEmail').value.trim();
  const name = document.getElementById('recipientName').value.trim() || 'Fleet Team';
  if (!email || !currentReport) return;

  const btn = document.getElementById('sendBtn');
  const msg = document.getElementById('statusMsg');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Sending...';
  msg.className = 'status-msg info';
  msg.textContent = 'Sending via Resend...';

  try {
    // Call Supabase Edge Function to send email
    const r = await fetch(`${SUPA}/functions/v1/send-defect-digest`, {
      method: 'POST',
      headers: { ...H, 'Authorization': `Bearer ${KEY}` },
      body: JSON.stringify({
        to_email: email,
        to_name: name,
        report: currentReport,
      })
    });

    if (r.ok) {
      msg.className = 'status-msg success';
      msg.textContent = `✅ Report sent to ${email}`;
    } else {
      const err = await r.json();
      // Edge function not deployed yet — show what would be sent
      msg.className = 'status-msg info';
      msg.textContent = `Edge function not yet deployed. Report ready: ${currentReport.total_defects} defects for ${email}. See console for payload.`;
      console.log('Would send to:', email, currentReport);
    }
  } catch(e) {
    msg.className = 'status-msg error';
    msg.textContent = 'Send failed: ' + e.message;
  }

  btn.disabled = false;
  btn.innerHTML = '✉ Send Email';
}

// Auto-load on open
loadReport();
</script>
</body>
</html>
